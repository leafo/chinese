<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%" role="img" aria-label="Simplified Mandarin Learning App Icon">
  <defs>
    <!-- Background Gradient (Primary Blue) -->
    <linearGradient id="base-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6" />
      <stop offset="100%" stop-color="#1d4ed8" />
    </linearGradient>

    <!-- Base Inner Highlight Gradient -->
    <linearGradient id="stroke-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#eff6ff" stop-opacity="0.6" />
      <stop offset="100%" stop-color="#1d4ed8" stop-opacity="0" />
    </linearGradient>

    <!-- Single Crisp Drop Shadow -->
    <filter id="shadow-solid" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#0f172a" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Base App Squircle -->
  <rect x="16" y="16" width="480" height="480" rx="112" fill="url(#base-grad)" />
  <rect x="18" y="18" width="476" height="476" rx="110" fill="none" stroke="url(#stroke-grad)" stroke-width="6" />

  <!-- Central Flashcard -->
  <g>
    <!-- White Card Background -->
    <rect x="86" y="76" width="340" height="360" rx="48" fill="#f8fafc" filter="url(#shadow-solid)" />
    <!-- Card Border -->
    <rect x="86" y="76" width="340" height="360" rx="48" fill="none" stroke="#cbd5e1" stroke-width="4" />

    <!-- Pinyin Tone Mark (First Tone / Flat) -->
    <!-- Thickness now matches the main character (40) and shifted slightly up to maintain padding -->
    <line x1="216" y1="126" x2="296" y2="126" stroke="#0f172a" stroke-width="40" stroke-linecap="round" />

    <!-- Bold Character "中" -->
    <rect x="156" y="221" width="200" height="110" rx="20" fill="none" stroke="#0f172a" stroke-width="40" stroke-linejoin="round" />
    <!-- Central Vertical Stroke -->
    <line x1="256" y1="186" x2="256" y2="386" stroke="#0f172a" stroke-width="40" stroke-linecap="round" />
  </g>
</svg>
